name: Verify Pending Payments

on:
  # Run every 30 minutes
  schedule:
    - cron: '*/30 * * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  verify-payments:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run payment verification
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CODETICKETS_PAYSTACK_SECRET_KEY: ${{ secrets.CODETICKETS_PAYSTACK_SECRET_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          BMS_API_KEY: ${{ secrets.BMS_API_KEY }}
          BMS_SENDER_ID: ${{ secrets.BMS_SENDER_ID }}
        run: npx tsx scripts/cron-verify-pending-payments.ts
